name: CI - Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.repository_owner }}/todo-app   # ghcr.io/[계정명]/todo-app

jobs:
  # -----------------------------------------------------------------------
  # Job 1: 테스트 (빌드 성공 여부 검증)
  # -----------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x spring-app/gradlew

      - name: 빌드 및 테스트
        run: |
          cd spring-app
          ./gradlew build --no-daemon

      - name: 테스트 결과 업로드 (실패 시 확인용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: spring-app/build/reports/tests/

  # -----------------------------------------------------------------------
  # Job 2: Docker 이미지 빌드 및 GHCR Push
  # (main 브랜치 push 시에만 실행)
  # -----------------------------------------------------------------------
  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test                          # test job 성공 후 실행
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write                    # GHCR push 권한

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      # 이미지 태그 전략: 커밋 SHA 7자리 + latest
      - name: 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short    # 예: a1b2c3d
            type=raw,value=latest

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정 (멀티플랫폼 빌드용)
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v5
        with:
          context: spring-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha           # GitHub Actions 캐시 활용
          cache-to: type=gha,mode=max

      - name: 빌드 결과 출력
        run: |
          echo "==========================================="
          echo "이미지 태그:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "커밋 SHA: ${{ github.sha }}"
          echo "==========================================="
