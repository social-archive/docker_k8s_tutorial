apiVersion: v1
kind: Service
metadata:
  name: todo-app
  namespace: todo-app
  labels:
    app: todo-app
spec:
  selector:
    app: todo-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080        # 로컬 브라우저에서 localhost:30080 으로 접근
  type: NodePort             # Docker Desktop에서 로컬 접근 허용
