# -----------------------------------------------------------------------
# Spring 애플리케이션 설정
# -----------------------------------------------------------------------
spring.application.name=spring-app

# -----------------------------------------------------------------------
# 데이터소스 - 환경변수로 주입 (Docker / Kubernetes 공통)
# -----------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tododb}
spring.datasource.username=${DB_USER:todo}
spring.datasource.password=${DB_PASSWORD:todo1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------------------------------
# 서버
# -----------------------------------------------------------------------
server.port=8080

# -----------------------------------------------------------------------
# Actuator (Kubernetes liveness / readiness probe 용)
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
