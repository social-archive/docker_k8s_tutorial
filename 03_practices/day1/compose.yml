# -----------------------------------------------------------------------
# Docker Compose - Spring Boot + PostgreSQL
# 1일차 모듈4 실습용
# -----------------------------------------------------------------------

services:

  # ------------------------------------------------------------------
  # PostgreSQL 데이터베이스
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    env_file: .env                         # .env 파일에서 환경변수 로드
    ports:
      - "5432:5432"                        # 로컬에서 DB 직접 접근 가능
    volumes:
      - postgres-data:/var/lib/postgresql/data  # 데이터 영속성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Spring Boot 애플리케이션
  # ------------------------------------------------------------------
  app:
    build:
      context: ../spring-app              # Dockerfile 위치
    container_name: todo-app
    env_file: .env                        # .env 파일에서 환경변수 로드
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy        # PostgreSQL이 준비된 후 기동
    restart: on-failure

volumes:
  postgres-data:
